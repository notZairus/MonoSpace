server {
  listen 80;
  server_name localhost;

  root /usr/share/nginx/html;
  index index.html;

  # 🔥 SPA routing (critical part)
  location / {
    try_files $uri $uri/ /index.html;
  }

  # 🚀 Cache static assets aggressively
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Optional: cache JS/CSS files (Vite/React builds)
  location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Prevent access to hidden files
  location ~ /\. {
    deny all;
  }

  # Basic compression (optional but useful)
  gzip on;
  gzip_types
    text/plain
    text/css
    application/javascript
    application/json
    image/svg+xml;
  gzip_min_length 256;
}